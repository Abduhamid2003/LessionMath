{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="glass-card p-4 mt-4">
        <h3 class="text-center mb-4" data-i18n="auth.newPassword">Новый пароль</h3>
        <form id="resetForm">
          <input type="hidden" id="token">
          <label class="form-label" data-i18n="login.password">Пароль</label>
          <input type="password" class="form-control mb-3" id="password" minlength="6" required>
          <button type="submit" class="btn btn-primary w-100" data-i18n="auth.savePassword">Сохранить</button>
        </form>
        <div id="resetMsg" class="mt-3"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('token').value = new URLSearchParams(location.search).get('token') || '';
});
document.getElementById('resetForm').addEventListener('submit', async e => {
  e.preventDefault();
  const res = await fetch('/api/auth/password-reset-confirm', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      token: document.getElementById('token').value,
      new_password: document.getElementById('password').value,
    }),
  });
  const data = await res.json();
  document.getElementById('resetMsg').innerHTML = res.ok
    ? `<div class="alert alert-success">${data.message} <a href="/login">Login</a></div>`
    : `<div class="alert alert-danger">${data.detail || 'Error'}</div>`;
});
</script>
{% endblock %}
