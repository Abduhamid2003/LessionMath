{% extends "base.html" %}
{% block content %}
<div class="container">
  <h2 class="mb-4" data-aos="fade-right" data-i18n="learning.title">Интерактивное обучение</h2>
  <div class="row g-4">
    <div class="col-lg-6">
      <h4 data-i18n="learning.lessons">Уроки</h4>
      <div class="row g-3" id="lessonsList"></div>
    </div>
    <div class="col-lg-6">
      <div class="glass-card p-3 mb-4">
        <h5 data-i18n="learning.practice">Практика: производная</h5>
        <input class="form-control mb-2" id="learnPracticeExpr" value="x**3">
        <input class="form-control mb-2" id="learnPracticeAns" placeholder="3*x**2">
        <button class="btn btn-sm btn-primary" id="learnCheckBtn" data-i18n="learning.check">Проверить</button>
        <div id="learnPracticeResult" class="mt-2"></div>
      </div>
      <h4 data-i18n="learning.tests">Тесты</h4>
      <div id="testsList"></div>
      <div id="testArea" class="mt-4 d-none"></div>
      <div id="testResult" class="mt-3"></div>
    </div>
  </div>
</div>

<div class="modal fade" id="lessonModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content glass-card">
      <div class="modal-header border-0">
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="lessonModalBody"></div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}<script src="/static/js/learning.js"></script>{% endblock %}
