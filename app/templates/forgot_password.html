{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="glass-card p-4 mt-4">
        <h3 class="text-center mb-4" data-i18n="auth.forgot">Восстановление пароля</h3>
        <form id="forgotForm">
          <label class="form-label" data-i18n="register.email">Email</label>
          <input type="email" class="form-control mb-3" id="email" required>
          <button type="submit" class="btn btn-primary w-100" data-i18n="auth.sendReset">Отправить</button>
        </form>
        <div id="forgotMsg" class="mt-3"></div>
        <p class="text-center mt-3"><a href="/login" data-i18n="nav.login">Вход</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
document.getElementById('forgotForm').addEventListener('submit', async e => {
  e.preventDefault();
  const res = await fetch('/api/auth/password-reset-request', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: document.getElementById('email').value }),
  });
  const data = await res.json();
  const el = document.getElementById('forgotMsg');
  if (data.reset_path) {
    el.innerHTML = `<div class="alert alert-info">${I18n.t('auth.resetLink')}<br><a href="${data.reset_path}">${data.reset_path}</a></div>`;
  } else {
    el.innerHTML = `<div class="alert alert-secondary">${data.message}</div>`;
  }
});
</script>
{% endblock %}
